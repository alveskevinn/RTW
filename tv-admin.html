<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotorwest — Painel Admin TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--fire:#df6429;--dark:#151515;--surface:#1e1e1e;--text:#f0ece6;--dim:#777;--r:14px}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
.panel{width:100%;max-width:520px}
.logo{text-align:center;margin-bottom:32px}
.logo img{height:32px;opacity:.7}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--fire);margin-top:10px}
.status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--dim);margin-bottom:28px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:background .3s}
.status-dot.on{background:#4ade80}
.status-dot.off{background:#ef4444}
h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px}
.input-group{position:relative;margin-bottom:20px}
textarea{width:100%;min-height:100px;background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:15px;padding:16px;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--fire)}
textarea::placeholder{color:var(--dim)}
.char-count{position:absolute;bottom:12px;right:14px;font-size:11px;color:var(--dim)}
.btn-send{width:100%;padding:16px;background:var(--fire);color:#fff;border:none;border-radius:100px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s}
.btn-send:hover{opacity:.9}
.btn-send:active{transform:scale(.97)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:28px 0;color:var(--dim);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.quick-btns{display:flex;flex-direction:column;gap:8px}
.btn-quick{padding:14px 20px;background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:14px;text-align:left;cursor:pointer;transition:all .2s}
.btn-quick:hover{border-color:var(--fire);background:rgba(223,100,41,.06)}
.btn-quick:active{transform:scale(.98)}
.btn-clear{margin-top:20px;width:100%;padding:14px;background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:100px;color:var(--dim);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s}
.btn-clear:hover{border-color:rgba(239,68,68,.4);color:#ef4444}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:10px 24px;font-size:13px;color:var(--text);opacity:0;transition:all .3s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="panel">
  <div class="logo">
    <img src="logoRTW.png" alt="Rotorwest">
    <div class="logo-text">Painel Admin — TV Sala VIP</div>
  </div>

  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Conectando...</span>
  </div>

  <h2>Enviar mensagem</h2>
  <div class="input-group">
    <textarea id="msgInput" placeholder="Digite a mensagem para a TV..." maxlength="200"></textarea>
    <span class="char-count"><span id="charCount">0</span>/200</span>
  </div>
  <button class="btn-send" id="btnSend" disabled>Enviar para a TV</button>

  <div class="divider">Mensagens rápidas</div>
  <div class="quick-btns">
    <button class="btn-quick" data-msg="Aeronave pronta para embarque">Aeronave pronta para embarque</button>
    <button class="btn-quick" data-msg="Embarque em 15 minutos">Embarque em 15 minutos</button>
    <button class="btn-quick" data-msg="Aguardando condições meteorológicas">Aguardando condições meteorológicas</button>
    <button class="btn-quick" data-msg="Bem-vindo à Rotorwest">Bem-vindo à Rotorwest</button>
  </div>

  <button class="btn-clear" id="btnClear">Limpar mensagem da TV</button>
</div>

<div class="toast" id="toast"></div>

<script>
const WS_URL = `ws://${location.host}`;
const input = document.getElementById('msgInput');
const btnSend = document.getElementById('btnSend');
const btnClear = document.getElementById('btnClear');
const charCount = document.getElementById('charCount');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const toast = document.getElementById('toast');

let ws;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    statusDot.className = 'status-dot on';
    statusText.textContent = 'Conectado à TV';
    btnSend.disabled = false;
  };
  ws.onclose = () => {
    statusDot.className = 'status-dot off';
    statusText.textContent = 'Desconectado — reconectando...';
    btnSend.disabled = true;
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}
connect();

function send(text) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'message', text, duration: 30 }));
  showToast('Mensagem enviada!');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

input.addEventListener('input', () => {
  charCount.textContent = input.value.length;
});

btnSend.addEventListener('click', () => {
  const text = input.value.trim();
  if (text) { send(text); input.value = ''; charCount.textContent = '0'; }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    btnSend.click();
  }
});

document.querySelectorAll('.btn-quick').forEach(btn => {
  btn.addEventListener('click', () => send(btn.dataset.msg));
});

btnClear.addEventListener('click', () => {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'clear' }));
    showToast('Mensagem limpa');
  }
});
</script>
</body>
</html>
